<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Webcam 條碼掃描器 | Barcode Scanner</title>
  <meta name="description" content="使用電腦 Webcam 即時掃描條碼，支援 Code 128、Code 39、EAN-13 等格式，可匯出 CSV。">
  <meta name="theme-color" content="#0B0F1A">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="2" height="16" rx="0.5"/>
            <rect x="5" y="4" width="1" height="16" rx="0.3"/>
            <rect x="7.5" y="4" width="2.5" height="16" rx="0.5"/>
            <rect x="11" y="4" width="1" height="16" rx="0.3"/>
            <rect x="13" y="4" width="1.5" height="16" rx="0.3"/>
            <rect x="15.5" y="4" width="2" height="16" rx="0.5"/>
            <rect x="18.5" y="4" width="1" height="16" rx="0.3"/>
            <rect x="20" y="4" width="2" height="16" rx="0.5"/>
          </svg>
        </div>
        <div>
          <h1>Webcam 條碼掃描器</h1>
          <p class="subtitle">支援 Code 128 · Code 39 · EAN-13 · UPC 等格式</p>
        </div>
      </div>
      <div class="header-actions">
        <span class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          待機中
        </span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Left Column: Tool Tabs -->
    <div class="tools-panel glass-card">
      <div class="tabs-header">
        <button class="tab-btn active" data-tab="webcam">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          Webcam
        </button>
        <button class="tab-btn" data-tab="paste">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          圖片掃描
        </button>
        <button class="tab-btn" data-tab="generator">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
          產生 QR Code
        </button>
      </div>

      <div class="tabs-content">
        <!-- Tab 1: Webcam -->
        <div class="tab-pane active" id="tab-webcam">
          <section class="scanner-section">
            <div class="scanner-header">
              <h2>即時掃描區</h2>
              <div class="scanner-controls">
                <button id="btnStart" class="btn btn-primary">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                  開始掃描
                </button>
                <button id="btnStop" class="btn btn-secondary" disabled>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                  停止
                </button>
              </div>
            </div>

            <div class="video-container" id="videoContainer">
              <div class="video-placeholder" id="videoPlaceholder">
                <div class="placeholder-icon">
                  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                  </svg>
                </div>
                <p>點擊「開始掃描」啟動 Webcam</p>
                <p class="hint">請確認已允許瀏覽器使用攝影機權限</p>
              </div>
              <video id="videoElement" autoplay playsinline></video>
              <div class="scan-overlay" id="scanOverlay">
                <div class="scan-region">
                  <div class="corner tl"></div>
                  <div class="corner tr"></div>
                  <div class="corner bl"></div>
                  <div class="corner br"></div>
                  <div class="scan-line"></div>
                </div>
              </div>
            </div>

            <div class="last-scan" id="lastScan" style="display:none;">
              <div class="last-scan-inner">
                <span class="last-scan-label">✅ 最新掃描結果</span>
                <span class="last-scan-value" id="lastScanValue"></span>
                <span class="last-scan-format" id="lastScanFormat"></span>
              </div>
            </div>

            <div class="settings-bar">
              <label class="setting-item">
                <span>🔊 掃描音效</span>
                <input type="checkbox" id="chkSound" checked>
                <span class="toggle"></span>
              </label>
              <label class="setting-item">
                <span>🚫 過濾重複</span>
                <input type="checkbox" id="chkDuplicate" checked>
                <span class="toggle"></span>
              </label>
            </div>
          </section>
        </div>

        <!-- Tab 2: Paste -->
        <div class="tab-pane" id="tab-paste">
          <section class="paste-section">
            <div class="paste-header">
              <h2>圖片解析</h2>
              <span class="paste-hint">Ctrl+V 或拖放圖片</span>
            </div>
            <div class="paste-zone" id="pasteZone">
              <div class="paste-zone-inner">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                <p>點擊選擇圖片、拖放圖片、或按 <kbd>Ctrl</kbd>+<kbd>V</kbd> 貼上螢幕截圖</p>
                <p class="hint">支援 PNG、JPG、BMP、WebP 等圖片格式</p>
              </div>
              <img id="pastePreview" class="paste-preview" style="display:none;" alt="預覽圖片">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
          </section>
        </div>

        <!-- Tab 3: Generator -->
        <div class="tab-pane" id="tab-generator">
          <section class="generator-section">
            <div class="generator-header">
              <h2>產生二維碼</h2>
            </div>
            <div class="generator-body">
              <textarea id="qrInput" placeholder="輸入文字或網址來產生 QR Code..." class="form-input" rows="3"></textarea>
              <div class="generator-actions">
                <button id="btnGenerateQR" class="btn btn-primary">產生條碼</button>
                <button id="btnDownloadQR" class="btn btn-outline" disabled>下載圖片</button>
              </div>
              <div class="qr-preview" id="qrPreviewWrap" style="display:none;">
                <canvas id="qrCanvas"></canvas>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <!-- Right Column: Results Section -->
    <section class="results-section glass-card">
      <div class="results-header">
        <h2>📋 掃描紀錄</h2>
        <div class="results-actions">
          <span class="count-badge" id="countBadge">0 筆</span>
          <button class="btn btn-outline" id="btnCopy" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            複製全部
          </button>
          <button class="btn btn-outline" id="btnExport" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            匯出 CSV
          </button>
          <button class="btn btn-danger-outline" id="btnClear" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            清除
          </button>
        </div>
      </div>

      <div class="results-table-wrap">
        <table class="results-table" id="resultsTable">
          <thead>
            <tr>
              <th class="col-num">#</th>
              <th class="col-time">時間</th>
              <th class="col-format">格式</th>
              <th class="col-value">條碼內容</th>
              <th class="col-action">操作</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <p>尚無掃描紀錄</p>
          <p class="hint">開始掃描後，結果會即時顯示在這裡</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
