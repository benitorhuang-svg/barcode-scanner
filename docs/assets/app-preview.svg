<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Webcam 條碼掃描器介面預覽</title>
  <desc id="desc">深色工作介面的條碼掃描器預覽圖，包含即時掃描、圖片解析、QR Code 產生與掃描紀錄。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset=".48" stop-color="#101827"/>
      <stop offset="1" stop-color="#16213b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182235"/>
      <stop offset="1" stop-color="#0e1728"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset=".52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399" stop-opacity="0"/>
      <stop offset=".5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-opacity=".045"/>
    </pattern>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#grid)"/>

  <g transform="translate(64 54)">
    <rect width="1152" height="692" rx="34" fill="#0b1220" stroke="#ffffff" stroke-opacity=".12" filter="url(#shadow)"/>
    <rect x="1" y="1" width="1150" height="78" rx="33" fill="#101a2c"/>
    <g transform="translate(36 24)">
      <rect width="34" height="34" rx="10" fill="url(#primary)"/>
      <g fill="#ffffff" transform="translate(8 8)">
        <rect width="2.8" height="18" rx="1"/>
        <rect x="5" width="1.8" height="18" rx=".8"/>
        <rect x="9" width="4" height="18" rx="1"/>
        <rect x="15" width="2" height="18" rx=".8"/>
        <rect x="19" width="3" height="18" rx="1"/>
      </g>
      <text x="52" y="16" fill="#f8fafc" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="22" font-weight="700">Webcam 條碼掃描器</text>
      <text x="52" y="40" fill="#9fb0c8" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13">即時掃描、圖片解析、QR Code 產生與 CSV 匯出</text>
    </g>
    <g transform="translate(952 25)">
      <rect width="132" height="30" rx="15" fill="#0f2b24" stroke="#34d399" stroke-opacity=".5"/>
      <circle cx="19" cy="15" r="5" fill="#34d399"/>
      <text x="34" y="20" fill="#bbf7d0" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13" font-weight="600">掃描就緒</text>
    </g>

    <g transform="translate(32 108)">
      <rect width="706" height="540" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".1"/>
      <g transform="translate(22 20)">
        <rect width="108" height="38" rx="13" fill="#25324a"/>
        <text x="54" y="25" fill="#f8fafc" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="700">Webcam</text>
        <rect x="120" width="112" height="38" rx="13" fill="#101827" stroke="#ffffff" stroke-opacity=".08"/>
        <text x="176" y="25" fill="#94a3b8" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">圖片掃描</text>
        <rect x="244" width="132" height="38" rx="13" fill="#101827" stroke="#ffffff" stroke-opacity=".08"/>
        <text x="310" y="25" fill="#94a3b8" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">產生 QR Code</text>
      </g>

      <g transform="translate(36 86)">
        <text x="0" y="0" fill="#e2e8f0" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="21" font-weight="700">即時掃描區</text>
        <rect x="470" y="-25" width="120" height="40" rx="12" fill="url(#primary)"/>
        <text x="530" y="1" fill="#07111f" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="800">開始掃描</text>
        <rect x="600" y="-25" width="70" height="40" rx="12" fill="#172033" stroke="#334155"/>
        <text x="635" y="1" fill="#cbd5e1" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="14" text-anchor="middle">停止</text>
      </g>

      <g transform="translate(36 120)">
        <rect width="634" height="310" rx="22" fill="#060b14" stroke="#24324a"/>
        <rect x="20" y="18" width="594" height="274" rx="18" fill="#101827"/>
        <path d="M78 78h120m-120 24h70m230-24h128m-128 24h82M92 224h420" stroke="#25324a" stroke-width="10" stroke-linecap="round"/>
        <g transform="translate(168 68)">
          <rect width="300" height="174" rx="16" fill="#0b1220" stroke="#34d399" stroke-opacity=".55"/>
          <path d="M28 52V26h42M230 26h42v26M28 122v26h42M272 122v26h-42" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
          <rect x="38" y="86" width="224" height="4" rx="2" fill="url(#scan)"/>
          <g fill="#dbeafe" transform="translate(72 56)">
            <rect width="8" height="64" rx="2"/>
            <rect x="18" width="4" height="64" rx="2"/>
            <rect x="32" width="14" height="64" rx="2"/>
            <rect x="58" width="5" height="64" rx="2"/>
            <rect x="78" width="10" height="64" rx="2"/>
            <rect x="104" width="4" height="64" rx="2"/>
            <rect x="120" width="18" height="64" rx="2"/>
            <rect x="148" width="6" height="64" rx="2"/>
          </g>
        </g>
      </g>

      <g transform="translate(36 454)">
        <rect width="305" height="52" rx="16" fill="#09231d" stroke="#34d399" stroke-opacity=".35"/>
        <text x="20" y="22" fill="#86efac" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13" font-weight="700">最新掃描結果</text>
        <text x="20" y="40" fill="#f8fafc" font-family="'Inter', system-ui, sans-serif" font-size="14">4710088411207 · EAN-13</text>
        <rect x="328" width="150" height="52" rx="16" fill="#101827" stroke="#24324a"/>
        <text x="350" y="22" fill="#cbd5e1" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13">掃描音效</text>
        <circle cx="448" cy="26" r="16" fill="#172033"/>
        <circle cx="458" cy="26" r="12" fill="#34d399"/>
        <rect x="494" width="176" height="52" rx="16" fill="#101827" stroke="#24324a"/>
        <text x="516" y="22" fill="#cbd5e1" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13">重複過濾</text>
        <circle cx="642" cy="26" r="16" fill="#172033"/>
        <circle cx="652" cy="26" r="12" fill="#34d399"/>
      </g>
    </g>

    <g transform="translate(770 108)">
      <rect width="350" height="540" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".1"/>
      <text x="28" y="42" fill="#e2e8f0" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="21" font-weight="700">掃描紀錄</text>
      <rect x="250" y="22" width="64" height="30" rx="15" fill="#1e293b"/>
      <text x="282" y="42" fill="#cbd5e1" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13" text-anchor="middle">6 筆</text>
      <g transform="translate(24 72)" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif">
        <rect width="302" height="46" rx="14" fill="#101827" stroke="#24324a"/>
        <text x="20" y="29" fill="#94a3b8" font-size="12">時間</text>
        <text x="92" y="29" fill="#94a3b8" font-size="12">格式</text>
        <text x="174" y="29" fill="#94a3b8" font-size="12">條碼內容</text>
        <g transform="translate(0 58)">
          <rect width="302" height="58" rx="16" fill="#0f172a"/>
          <text x="20" y="35" fill="#e2e8f0" font-size="13">14:08:32</text>
          <rect x="92" y="18" width="64" height="24" rx="12" fill="#24324a"/>
          <text x="124" y="35" fill="#bfdbfe" font-size="12" text-anchor="middle">EAN-13</text>
          <text x="174" y="35" fill="#f8fafc" font-size="13">4710088411207</text>
        </g>
        <g transform="translate(0 128)">
          <rect width="302" height="58" rx="16" fill="#0b1322"/>
          <text x="20" y="35" fill="#cbd5e1" font-size="13">14:08:18</text>
          <rect x="92" y="18" width="76" height="24" rx="12" fill="#24324a"/>
          <text x="130" y="35" fill="#bfdbfe" font-size="12" text-anchor="middle">Code 128</text>
          <text x="184" y="35" fill="#f8fafc" font-size="13">A7-2048-INV</text>
        </g>
        <g transform="translate(0 198)">
          <rect width="302" height="58" rx="16" fill="#0f172a"/>
          <text x="20" y="35" fill="#cbd5e1" font-size="13">14:07:51</text>
          <rect x="92" y="18" width="70" height="24" rx="12" fill="#24324a"/>
          <text x="127" y="35" fill="#bfdbfe" font-size="12" text-anchor="middle">QR Code</text>
          <text x="176" y="35" fill="#f8fafc" font-size="13">https://...</text>
        </g>
      </g>

      <g transform="translate(24 392)">
        <rect width="94" height="42" rx="13" fill="#172033" stroke="#334155"/>
        <text x="47" y="27" fill="#cbd5e1" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13" text-anchor="middle">複製全部</text>
        <rect x="108" width="92" height="42" rx="13" fill="#172033" stroke="#334155"/>
        <text x="154" y="27" fill="#cbd5e1" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13" text-anchor="middle">匯出 CSV</text>
        <rect x="214" width="88" height="42" rx="13" fill="#2a1420" stroke="#f87171" stroke-opacity=".4"/>
        <text x="258" y="27" fill="#fecaca" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="13" text-anchor="middle">清除</text>
      </g>
    </g>
  </g>
</svg>
