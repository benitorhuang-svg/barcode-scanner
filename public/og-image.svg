<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Webcam 條碼掃描器</title>
  <desc id="desc">Webcam 條碼掃描器的分享預覽圖，呈現條碼掃描與紀錄匯出的產品介面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset=".55" stop-color="#101827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset=".48" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#020617" flood-opacity=".42"/>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#ffffff" stroke-opacity=".05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g transform="translate(72 82)">
    <rect width="72" height="72" rx="20" fill="url(#accent)"/>
    <g fill="#ffffff" transform="translate(19 18)">
      <rect width="5" height="36" rx="2"/>
      <rect x="10" width="3" height="36" rx="1.5"/>
      <rect x="18" width="8" height="36" rx="2"/>
      <rect x="31" width="4" height="36" rx="1.5"/>
      <rect x="40" width="6" height="36" rx="2"/>
    </g>
    <text x="0" y="138" fill="#f8fafc" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="58" font-weight="800">Webcam 條碼掃描器</text>
    <text x="2" y="188" fill="#cbd5e1" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="26" font-weight="500">即時掃描、圖片解析、QR Code 產生、CSV 匯出</text>
    <g transform="translate(0 236)" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif">
      <rect width="152" height="46" rx="23" fill="#0f2b24" stroke="#34d399" stroke-opacity=".48"/>
      <circle cx="26" cy="23" r="6" fill="#34d399"/>
      <text x="46" y="30" fill="#bbf7d0" font-size="18" font-weight="700">離線優先</text>
      <rect x="170" width="176" height="46" rx="23" fill="#172033" stroke="#334155"/>
      <text x="258" y="30" fill="#dbeafe" font-size="18" text-anchor="middle" font-weight="700">本機 Google Fonts</text>
      <rect x="364" width="144" height="46" rx="23" fill="#172033" stroke="#334155"/>
      <text x="436" y="30" fill="#dbeafe" font-size="18" text-anchor="middle" font-weight="700">PWA 支援</text>
    </g>
  </g>

  <g transform="translate(650 92)" filter="url(#shadow)">
    <rect width="446" height="420" rx="28" fill="#0b1220" stroke="#ffffff" stroke-opacity=".12"/>
    <rect x="1" y="1" width="444" height="58" rx="27" fill="#101a2c"/>
    <circle cx="34" cy="30" r="6" fill="#f87171"/>
    <circle cx="56" cy="30" r="6" fill="#facc15"/>
    <circle cx="78" cy="30" r="6" fill="#34d399"/>
    <rect x="30" y="86" width="258" height="214" rx="20" fill="#060b14" stroke="#24324a"/>
    <rect x="54" y="110" width="210" height="166" rx="16" fill="#101827"/>
    <path d="M86 152v-24h36M214 128h36v24M86 232v24h36M250 232v24h-36" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
    <g fill="#e0f2fe" transform="translate(109 161)">
      <rect width="7" height="60" rx="2"/>
      <rect x="16" width="4" height="60" rx="2"/>
      <rect x="28" width="13" height="60" rx="2"/>
      <rect x="52" width="5" height="60" rx="2"/>
      <rect x="70" width="10" height="60" rx="2"/>
      <rect x="96" width="4" height="60" rx="2"/>
      <rect x="112" width="17" height="60" rx="2"/>
    </g>
    <rect x="306" y="86" width="108" height="44" rx="14" fill="url(#accent)"/>
    <text x="360" y="114" fill="#07111f" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif" font-size="16" text-anchor="middle" font-weight="800">開始掃描</text>
    <g transform="translate(306 154)" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif">
      <rect width="108" height="56" rx="16" fill="#09231d" stroke="#34d399" stroke-opacity=".35"/>
      <text x="16" y="23" fill="#86efac" font-size="12" font-weight="700">最新結果</text>
      <text x="16" y="42" fill="#f8fafc" font-size="13">EAN-13</text>
    </g>
    <g transform="translate(30 324)" font-family="'Noto Sans TC', 'Inter', system-ui, sans-serif">
      <rect width="384" height="56" rx="16" fill="#101827" stroke="#24324a"/>
      <text x="18" y="35" fill="#cbd5e1" font-size="15">14:08:32</text>
      <rect x="104" y="16" width="70" height="24" rx="12" fill="#24324a"/>
      <text x="139" y="33" fill="#bfdbfe" font-size="12" text-anchor="middle">EAN-13</text>
      <text x="198" y="35" fill="#f8fafc" font-size="15">4710088411207</text>
    </g>
  </g>
</svg>
